  <style>
    :root {
      --bg: #0e0e12;
      --surface: #16161d;
      --border: #2a2a38;
      --accent: #7c6cfc;
      --text: #e8e8f0;
      --muted: #7070a0;
      --success: #4cdb8a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 80px;
      background-image: radial-gradient(ellipse 60% 40% at 80% 10%, rgba(124,108,252,0.08) 0%, transparent 60%);
    }

    header {
      max-width: 680px;
      margin: 0 auto 36px;
      text-align: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p { margin-top: 8px; color: var(--muted); font-size: 12px; }

    .grid {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sortable-ghost {
      opacity: 0.4;
      border: 2px dashed var(--accent);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: grab;
      transition: transform 0.15s, border-color 0.15s;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .card:active { cursor: grabbing; }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); }

    .card-title { font-size: 14px; font-weight: 500; pointer-events: none; }

    .copy-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .card.copied { border-color: rgba(76,219,138,0.4); }
    .card.copied .card-title { color: var(--success); }
    .card.copied .copy-btn { color: var(--success); }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--success);
      color: #0a2016;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 20px;
      border-radius: 100px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>

    const grid = document.getElementById('grid');
    const toast = document.getElementById('toast');
    let toastTimer;

    // 카드 생성 함수
    function createCards() {
      messages.forEach(msg => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.text = msg.text;
        card.innerHTML = `
          <span class="card-title">${msg.title}</span>
          <span class="copy-btn">DRAG & CLICK</span>
        `;
        
        card.addEventListener('click', (e) => {
          // 드래그 중 클릭 방지 (sorting 중일 때 클릭 무시)
          if (card.classList.contains('sorting')) return;
          
          const textToCopy = card.dataset.text;
          navigator.clipboard.writeText(textToCopy).then(() => {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('copied'));
            card.classList.add('copied');
            
            clearTimeout(toastTimer);
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
          });
        });
        grid.appendChild(card);
      });
    }

    createCards();

    // 드래그 앤 드롭 활성화
    new Sortable(grid, {
      animation: 150,
      ghostClass: 'sortable-ghost',
      onStart: function() {
        document.querySelectorAll('.card').forEach(c => c.classList.add('sorting'));
      },
      onEnd: function() {
        setTimeout(() => {
          document.querySelectorAll('.card').forEach(c => c.classList.remove('sorting'));
        }, 100);
      }
    });
  </script>

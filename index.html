<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>외눈이 클립보드 (정렬 가능)</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

  <style>
    :root {
      --bg: #0e0e12;
      --surface: #16161d;
      --border: #2a2a38;
      --accent: #7c6cfc;
      --text: #e8e8f0;
      --muted: #7070a0;
      --success: #4cdb8a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 80px;
      background-image: radial-gradient(ellipse 60% 40% at 80% 10%, rgba(124,108,252,0.08) 0%, transparent 60%);
    }

    header {
      max-width: 680px;
      margin: 0 auto 36px;
      text-align: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p { margin-top: 8px; color: var(--muted); font-size: 12px; }

    .grid {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 드래그 중인 카드 스타일 */
    .sortable-ghost {
      opacity: 0.4;
      border: 2px dashed var(--accent);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: grab; /* 드래그 가능 아이콘 */
      transition: transform 0.15s, border-color 0.15s;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .card:active { cursor: grabbing; }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); }

    .card-title { font-size: 14px; font-weight: 500; pointer-events: none; }

    .copy-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.15s;
      padding: 5px;
      cursor: pointer;
    }

    .card.copied { border-color: rgba(76,219,138,0.4); }
    .card.copied .card-title { color: var(--success); }
    .card.copied .copy-btn { color: var(--success); }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--success);
      color: #0a2016;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 20px;
      border-radius: 100px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <header>
    <h1>👁 외눈이 클립보드</h1>
    <p>길게 눌러 드래그해서 순서를 바꾸고, 클릭해서 복사하세요</p>
  </header>

  <div class="grid" id="grid"></div>
  <div class="toast" id="toast">✓ 복사 완료!</div>

  <script>
    const messages = [
      { title: "파리 교통권 추천 서비스", text: `📩 파리 교통권 추천 서비스 안내...` },
      { title: "38Riv 재즈클럽 예약 안내", text: `📩 38Riv 재즈클럽 예약 안내 DM...` },
      { title: "빅 마마 그룹 맛집 지도 (이탈리안)", text: `[빅 마마 그룹 맛집 지도 🍕🇫🇷]...` },
      { title: "2026 파리 바게트 TOP 10 지도", text: `📩 2026 파리 바게트 TOP 10 지도...` },
      { title: "오 코셰 예약 및 한국어 메뉴", text: `📩 오 코셰 예약 및 한국어 메뉴 안내 DM...` },
      { title: "네르하 여행 가이드 (스페인)", text: `[네르하 여행 안내 가이드 🌊]...` },
      { title: "에어프랑스 비즈니스 업그레이드 팁", text: `✈️ 🇫🇷 에어프랑스 비즈니스 탑승 상세 후기...` },
      { title: "바토무슈 유람선 티켓 & 쿠폰", text: `🇫🇷 파리 바토무슈 유람선 티켓 링크...` },
      { title: "뤼나르 샴페인 하우스 예약", text: `📩 뤼나르 예약 링크 안내 DM...` },
      { title: "파리 내추럴 와인바 8곳 지도", text: `📩 파리 와인바 리스트 공유 DM...` },
      { title: "부용 샤르티에 가성비 식당 정보", text: `🇫🇷 파리 가성비 식당, 부용 샤르티에...` },
      { title: "PSG 축구 직관 예매 안내", text: `⚽️🇫🇷 파리 생제르망(PSG) 축구 직관...` },
      { title: "베르동 협곡 보트 대여 안내", text: `🇫🇷 남프랑스 베르동 협곡 보트...` },
      { title: "향수 만들기 클래스 & 할인코드", text: `📩 향수 만들기 클래스 예약...` }
    ];

    const grid = document.getElementById('grid');
    const toast = document.getElementById('toast');
    let toastTimer;

    // 카드 생성 함수
    function createCards() {
      messages.forEach(msg => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.text = msg.text; // 텍스트 데이터를 속성에 저장
        card.innerHTML = `
          <span class="card-title">${msg.title}</span>
          <span class="copy-btn">COPY</span>
        `;
        
        card.addEventListener('click', () => {
          const textToCopy = card.dataset.text;
          navigator.clipboard.writeText(textToCopy).then(() => {
            document.querySelectorAll('.card').forEach(c => {
              c.classList.remove('copied');
              c.querySelector('.copy-btn').textContent = 'COPY';
            });
            card.classList.add('copied');
            card.querySelector('.copy-btn').textContent = '✓';
            clearTimeout(toastTimer);
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
            setTimeout(() => {
              card.classList.remove('copied');
              card.querySelector('.copy-btn').textContent = 'COPY';
            }, 3000);
          });
        });
        grid.appendChild(card);
      });
    }

    createCards();

    // 2. 드래그 앤 드랍 활성화
    new Sortable(grid, {
      animation: 150,
      ghostClass: 'sortable-ghost',
      onEnd: function() {
        console.log("순서 변경 완료");
      }
    });
  </script>
</body>
</html>
